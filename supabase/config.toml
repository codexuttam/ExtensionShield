project_id = "your-supabase-project-ref"

[db]
# Matches Supabase default major version for new projects.
major_version = 17

[db.migrations]
# Declarative schema files are executed in this order.
# Functions must be created first since they're used by triggers.
# user_profiles must come after user_scan_history since trigger references it.
schema_paths = [
  "./schemas/functions.sql",
  "./schemas/user_scan_history.sql",
  "./schemas/user_profiles.sql",
  "./schemas/*.sql",
]

